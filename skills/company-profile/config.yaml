name: company-profile
version: "1.1"
description: "Generate comprehensive company profile with financials, comps, valuation, and report"

triggers:
  - event: new_filing
    filter: {form_type: ["10-K"]}
    action: generate
  - event: task_request
    action: generate

inputs:
  api_endpoints:
    - GET /api/companies/{ticker}
    - GET /api/financials/{ticker}/income-statements
    - GET /api/financials/{ticker}/balance-sheets
    - GET /api/financials/{ticker}/cash-flows
    - GET /api/financials/{ticker}/metrics
    - GET /api/financials/{ticker}/prices
    - GET /api/financials/{ticker}/segments
    - GET /api/financials/{ticker}/stock-splits
    - GET /api/financials/{ticker}/annual
    - GET /api/filings/{ticker}/
    - GET /api/analysis/valuation/{ticker}
    - GET /api/analysis/comps/{ticker}
  artifacts: []

outputs:
  path: "data/artifacts/{ticker}/profile/"
  files:
    - company_overview.json
    - management_team.json
    - risk_factors.json
    - competitive_landscape.json
    - financial_segments.json
    - investment_thesis.json
    - comps_table.json
    - financial_data.json
    - valuation_summary.json
    - company_profile.md

requires_intelligence: true
