name: etl-coverage
version: "1.0"
description: "Audit ETL data coverage and flag gaps"

triggers:
  - cron: "0 8 * * 1"
    action: check --all

inputs:
  api_endpoints:
    - GET /api/companies/
    - GET /api/companies/{ticker}
    - GET /api/financials/{ticker}/income-statements?years=5
    - GET /api/financials/{ticker}/balance-sheets?years=5
  artifacts: []

outputs:
  path: "data/artifacts/_etl/"
  files:
    - coverage_report.json

requires_intelligence: false
