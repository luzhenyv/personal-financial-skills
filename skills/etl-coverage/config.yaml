name: etl-coverage
version: "1.0"
description: "Audit ETL data coverage and flag gaps"

triggers:
  - cron: "0 8 * * 1"
    action: check --all

inputs:
  mcp_tools:
    - list_companies
    - get_company
    - get_income_statements
    - get_balance_sheets
  artifacts: []

outputs:
  path: "data/artifacts/_etl/"
  files:
    - coverage_report.json

requires_intelligence: false
