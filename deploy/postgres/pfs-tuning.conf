# PostgreSQL tuning for 2GB RAM server (Mini Bloomberg)
# Place in /etc/postgresql/16/main/conf.d/

# Memory — conservative for small server
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Connections — we only have 3 clients (API + Streamlit + MCP/CLI)
max_connections = 20

# WAL — reduce write overhead
wal_buffers = 4MB
checkpoint_completion_target = 0.9

# Planner
random_page_cost = 1.1
effective_io_concurrency = 200

# Logging
log_min_duration_statement = 1000
