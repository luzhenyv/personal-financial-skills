---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: personal-financial-skills
prefect-version: 3.6.23

# build section allows you to manage and build docker images
build: null

# push section allows you to manage if and how this project
# is uploaded to remote locations
push: null

# pull section allows you to provide instructions for cloning
# this project in remote locations
pull:
- prefect.deployments.steps.set_working_directory:
    directory: /Users/zhenyvlu/Steven/project/personal-financial-skills

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: local-price-sync
  version: null
  tags:
  - local
  - etl
  description: Sync daily prices for all tracked tickers.
  schedule:
    cron: 30 17 * * 1-5
    timezone: America/New_York
    day_or: true
  entrypoint: prefect/flows/price_sync.py:price_sync
  parameters: {}
  work_pool:
    name: pfs-local-pool
    work_queue_name: default
    job_variables: {}
- name: local-filing-check
  version: null
  tags:
  - local
  - filings
  description: Check SEC EDGAR for new filings, queue analysis tasks.
  schedule:
    cron: 0 6 * * *
    timezone: America/New_York
    day_or: true
  entrypoint: prefect/flows/filing_check.py:filing_check
  parameters: {}
  work_pool:
    name: pfs-local-pool
    work_queue_name: default
    job_variables: {}
- name: local-data-validation
  version: null
  tags:
  - local
  - validation
  description: Run DB integrity checks and flag anomalies.
  schedule:
    cron: 0 2 * * 0
    timezone: America/New_York
    day_or: true
  entrypoint: prefect/flows/data_validation.py:data_validation
  parameters: {}
  work_pool:
    name: pfs-local-pool
    work_queue_name: default
    job_variables: {}
